name: Sync install bundle

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'README.md'
      - 'LICENSE'
      - 'examples/**'
      - 'references/**'
      - 'scripts/generate_bundle.py'
      - '.github/workflows/sync-install-bundle.yml'
  workflow_dispatch:

jobs:
  sync-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout bundle repo
        uses: actions/checkout@v4
        with:
          repository: bothiu/arsitek-kampung-install-bundle
          token: ${{ secrets.BUNDLE_PUSH_TOKEN }}
          path: bundle
          fetch-depth: 1

      - name: Generate bundle
        run: |
          python3 scripts/generate_bundle.py --bundle-dir "$GITHUB_WORKSPACE/bundle"

      - name: Commit and push bundle changes
        working-directory: bundle
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No bundle changes to publish"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SKILL.md README.md LICENSE

          if git diff --cached --quiet; then
            echo "No staged bundle changes"
            exit 0
          fi

          git commit -m "chore: sync generated bundle"
          git push origin HEAD:main
